<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cyber Shooter PRO - Cross Platform</title>
<style>
html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background: radial-gradient(circle at center, #0a0a0f, #111827);
    font-family:'Arial', sans-serif;
    overflow:hidden;
}
canvas{
    display:block;
    margin:0 auto;
    background:#111827;
    border:3px solid cyan;
    box-shadow:0 0 20px cyan;
}
button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#0ee;
    color:#111;
    font-weight:bold;
    box-shadow:0 0 10px #0ee;
}
button:hover{
    background:#22d3ee;
    box-shadow:0 0 20px #22d3ee;
}
#restartBtn{
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    display:none;
}
.touch-btn{
    position:absolute;
    width:60px;
    height:60px;
    border-radius:30px;
    background:#0ee;
    opacity:0.7;
    text-align:center;
    line-height:60px;
    font-weight:bold;
    color:#111;
    box-shadow:0 0 10px #0ee;
    user-select:none;
}
#btnLeft{left:20px; bottom:30px;}
#btnRight{left:100px; bottom:30px;}
#btnShoot{right:20px; bottom:30px;}
#btnShield{right:100px; bottom:30px;}
</style>
</head>
<body>

<canvas id="game"></canvas>
<button id="restartBtn">重新开始</button>

<div id="btnLeft" class="touch-btn">←</div>
<div id="btnRight" class="touch-btn">→</div>
<div id="btnShoot" class="touch-btn">💥</div>
<div id="btnShield" class="touch-btn">🛡</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// 自适应屏幕
function resizeCanvas(){
    canvas.width = Math.min(window.innerWidth,400);
    canvas.height = Math.min(window.innerHeight,600);
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

// 游戏变量
let player = {};
let enemies = [];
let particles = [];
let stars = [];
let keys = {left:false, right:false, shoot:false, shield:false};
let score=0, lives=3, speed=2, shieldActive=false, gameRunning=false;
let highScore = localStorage.getItem("highScore")||0;

// 初始化星空
for(let i=0;i<80;i++) stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, size:Math.random()*2});

// 开始游戏
function startGame(){
    document.getElementById("restartBtn").style.display="none";
    player = {x:canvas.width/2-20, y:canvas.height-80, size:40, vx:0, bullets:[]};
    enemies = [];
    particles = [];
    score = 0; lives=3; speed=2; shieldActive=false; gameRunning=true;
    update();
}

// 重新开始按钮
document.getElementById("restartBtn").onclick = ()=>{ startGame(); };

// 发射子弹
function shoot(){
    if(player.bullets.length<5) player.bullets.push({x:player.x+18, y:player.y, size:4, vy:-10});
}

// 生成敌人
function spawnEnemy(){
    if(!gameRunning) return;
    enemies.push({x:Math.random()*(canvas.width-40), y:-40, size:40, vy:speed, type:"normal"});
    if(Math.random()<0.05) enemies.push({x:Math.random()*(canvas.width-80), y:-80, size:80, vy:speed*0.5, type:"boss"});
}
setInterval(spawnEnemy,900);

// 爆炸粒子
function createExplosion(x,y){
    for(let i=0;i<30;i++) particles.push({x:x, y:y, vx:(Math.random()-0.5)*6, vy:(Math.random()-0.5)*6, life:30});
}

// 触控按钮
function touchStart(e, action){ e.preventDefault(); keys[action]=true; }
function touchEnd(e, action){ e.preventDefault(); keys[action]=false; }
document.getElementById("btnLeft").addEventListener("touchstart", e=>touchStart(e,"left"));
document.getElementById("btnLeft").addEventListener("touchend", e=>touchEnd(e,"left"));
document.getElementById("btnRight").addEventListener("touchstart", e=>touchStart(e,"right"));
document.getElementById("btnRight").addEventListener("touchend", e=>touchEnd(e,"right"));
document.getElementById("btnShoot").addEventListener("touchstart", e=>touchStart(e,"shoot"));
document.getElementById("btnShoot").addEventListener("touchend", e=>touchEnd(e,"shoot"));
document.getElementById("btnShield").addEventListener("touchstart", e=>touchStart(e,"shield"));
document.getElementById("btnShield").addEventListener("touchend", e=>touchEnd(e,"shield"));

// 键盘监听
document.addEventListener("keydown", e=>{
    if(e.key==="ArrowLeft") keys.left=true;
    if(e.key==="ArrowRight") keys.right=true;
    if(e.key===" ") keys.shoot=true;
    if(e.key==="Shift") keys.shield=true;
});
document.addEventListener("keyup", e=>{
    if(e.key==="ArrowLeft") keys.left=false;
    if(e.key==="ArrowRight") keys.right=false;
    if(e.key===" ") keys.shoot=false;
    if(e.key==="Shift") keys.shield=false;
});

// 更新函数
function update(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // 星空
    ctx.fillStyle="white";
    stars.forEach(star=>{ star.y+=1; if(star.y>canvas.height) star.y=0; ctx.fillRect(star.x,star.y,star.size,star.size); });

    if(!gameRunning) return;

    // 玩家移动
    if(keys.left) player.vx-=0.5;
    if(keys.right) player.vx+=0.5;
    player.vx*=0.9;
    if(player.vx>6) player.vx=6;
    if(player.vx<-6) player.vx=-6;
    player.x+=player.vx;
    if(player.x<0) player.x=0;
    if(player.x>canvas.width-40) player.x=canvas.width-40;

    // 射击
    if(keys.shoot) shoot();

    // 护盾
    shieldActive = keys.shield;
    ctx.shadowBlur=20;
    ctx.shadowColor="cyan";
    ctx.fillStyle = shieldActive?"#22d3ee":"#00f0ff";
    ctx.fillRect(player.x,player.y,40,40);
    ctx.shadowBlur=0;
    if(shieldActive){ ctx.strokeStyle="#22d3ee"; ctx.lineWidth=3; ctx.strokeRect(player.x-5,player.y-5,50,50); }

    // 子弹更新
    player.bullets.forEach((b,i)=>{ b.y+=b.vy; ctx.fillStyle="yellow"; ctx.fillRect(b.x,b.y,b.size,b.size); if(b.y<0) player.bullets.splice(i,1); });

    // 敌人更新
    enemies.forEach((enemy,ei)=>{
        enemy.y+=enemy.vy;
        ctx.shadowBlur=15;
        ctx.shadowColor=enemy.type==="boss"?"magenta":"red";
        ctx.fillStyle=enemy.type==="boss"?"magenta":"red";
        ctx.fillRect(enemy.x,enemy.y,enemy.size,enemy.size);
        ctx.shadowBlur=0;

        // 撞玩家
        if(!shieldActive && player.x<enemy.x+enemy.size && player.x+40>enemy.x && player.y<enemy.y+enemy.size && player.y+40>enemy.y){
            createExplosion(player.x+20,player.y+20);
            enemies.splice(ei,1);
            lives--;
        }

        // 子弹碰撞
        player.bullets.forEach((b,bi)=>{
            if(b.x<enemy.x+enemy.size && b.x+b.size>enemy.x && b.y<enemy.y+enemy.size && b.y+b.size>enemy.y){
                createExplosion(enemy.x+enemy.size/2,enemy.y+enemy.size/2);
                enemies.splice(ei,1);
                player.bullets.splice(bi,1);
                score += enemy.type==="boss"?5:1;
            }
        });

        if(enemy.y>canvas.height){ enemies.splice(ei,1); score++; speed+=0.01; }
    });

    // 粒子更新
    particles.forEach((p,i)=>{ p.x+=p.vx; p.y+=p.vy; p.life--; ctx.fillStyle="orange"; ctx.fillRect(p.x,p.y,4,4); if(p.life<=0) particles.splice(i,1); });

    // UI
    ctx.fillStyle="cyan";
    ctx.font="16px Arial";
    ctx.fillText("Score: "+score,10,20);
    ctx.fillText("Lives: "+lives,canvas.width-70,20);
    ctx.fillText("High: "+highScore,canvas.width/2-40,20);

    // GAME OVER
    if(lives<=0){
        gameRunning=false;
        if(score>highScore){ highScore=score; localStorage.setItem("highScore",highScore);}
        ctx.fillStyle="white";
        ctx.font="30px Arial";
        ctx.fillText("GAME OVER",canvas.width/2-100,canvas.height/2-20);
        ctx.font="20px Arial";
        ctx.fillText("点击按钮重新开始",canvas.width/2-90,canvas.height/2+20);
        document.getElementById("restartBtn").style.display="block";
        return;
    }

    requestAnimationFrame(update);
}

// 自动开始
startGame();
</script>
</body>
</html>
